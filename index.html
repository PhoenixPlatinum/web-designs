<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diogo Silva | Portfólio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
      line-height: 1.6;
    }

    header {
      padding: 60px 20px 30px;
      text-align: center;
    }

    header h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    header p {
      font-size: 1.1rem;
      max-width: 700px;
      margin: 0 auto;
      color: #444;
    }

    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 30px 20px 60px;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .card h2 {
      font-size: 1.4rem;
      margin-bottom: 10px;
    }

    .card p {
      color: #555;
      margin-bottom: 16px;
    }

    .card a {
      display: inline-block;
      text-decoration: none;
      color: white;
      background: #111;
      padding: 10px 16px;
      border-radius: 8px;
    }

    .card a:hover {
      background: #333;
    }

    footer {
      text-align: center;
      padding: 30px 20px;
      color: #666;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>Diogo Silva</h1>
    <p>Portfólio de projetos em marketing, web e comunicação digital.</p>
  </header>

  <main>
    <section>
      <h2>Projetos</h2>

      <div class="projects">
        <div class="card">
          <h2>McLaren</h2>
          <p>Projeto web com foco visual e estrutura de apresentação.</p>
          <a href="McLaren.html">Ver projeto</a>
        </div>

        <div class="card">
          <h2>SneakerStreet</h2>
          <p>Projeto de website com identidade própria e abordagem comercial.</p>
          <a href="SneakerStreet.html">Ver projeto</a>
        </div>
      </div>
    </section>
  </main>

  <footer>
    © 2026 Diogo Silva
  </footer>

</body>
</html>
