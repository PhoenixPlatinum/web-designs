<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diogo Silva | Portfólio</title>
  <meta name="description" content="Portfólio de projetos em marketing, web e comunicação digital." />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
      line-height: 1.6;
    }

    header {
      padding: 80px 20px 40px;
      text-align: center;
    }

    header h1 {
      font-size: 3.5rem;
      margin-bottom: 12px;
    }

    header p {
      font-size: 1.2rem;
      color: #444;
      max-width: 800px;
      margin: 0 auto;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 20px 60px;
    }

    h2 {
      font-size: 2.2rem;
      margin-bottom: 30px;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.10);
    }

    .card h3 {
      font-size: 2rem;
      margin-bottom: 14px;
    }

    .card p {
      font-size: 1.1rem;
      color: #444;
      margin-bottom: 24px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      background: #111;
      color: #fff;
      padding: 14px 22px;
      border-radius: 12px;
      font-weight: bold;
      transition: background 0.2s ease;
    }

    .btn:hover {
      background: #333;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      color: #666;
      font-size: 1rem;
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 2.6rem;
      }

      h2 {
        font-size: 1.8rem;
      }

      .card h3 {
        font-size: 1.7rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Diogo Silva</h1>
    <p>Portfólio de projetos em marketing, web e comunicação digital.</p>
  </header>

  <main>
    <h2>Projetos</h2>

    <section class="projects">
      <article class="card">
        <h3>McLaren</h3>
        <p>Projeto web com foco visual e estrutura de apresentação.</p>
        <a class="btn" href="McLarenSite/McLaren.html">Ver projeto</a>
      </article>

      <article class="card">
        <h3>SneakerStreet</h3>
        <p>Projeto de website com identidade própria e abordagem comercial.</p>
        <a class="btn" href="SneakerStore/SneakerStreet.html">Ver projeto</a>
      </article>
    </section>
  </main>

  <footer>
    <p>© 2026 Diogo Silva</p>
  </footer>
</body>
</html>
